<!doctype html>
<html lang="pl">
    <head>
        <meta charset="utf-8" />
        <script src="67_1.js" defer></script>
        <link rel="stylesheet" href="./style.css" />
        <style>
            body {
                line-height: 25px;
            }
        </style>
        <title>67_1 — Formularz</title>
    </head>
    <body>
        <header class="app-header">
            <h2 id="app-name">JS + React</h2>
            <nav id="app-nav">
                <a href="/js-react-alx">
                    <button>Wróć na stronę główną</button>
                </a>
            </nav>
        </header>
        <main>
            <form>
                <label for="imie">Imię: </label>
                <input type="text" name="imie" id="imie_input" />
                <span id="error_imie" style="color: red"></span><br />

                <label for="nazwisko">Nazwisko: </label>
                <input type="text" name="nazwisko" id="nazwisko_input" />
                <span id="error_nazwisko" style="color: red"></span><br />

                <label for="miasto">Miasto: </label>
                <select name="miasto">
                    <option value="">-- wybierz --</option>
                    <option value="Warszawa">Warszawa</option>
                    <option value="Kraków">Kraków</option>
                    <option value="Wrocław">Wrocław</option>
                    <option value="Poznań">Poznań</option>
                    <option value="Gdańsk">Gdańsk</option>
                    <option value="Katowice">Katowice</option>
                </select>
                <span id="error_miasto" style="color: red"></span><br />

                <fieldset>
                    <legend>Stanowisko:</legend>
                    <label><input type="radio" name="stanowisko" value="frontend" /> Frontend</label>
                    <label><input type="radio" name="stanowisko" value="backend" /> Backend</label>
                    <label><input type="radio" name="stanowisko" value="fullstack" /> Fullstack</label>
                </fieldset>
                <span id="error_stanowisko" style="color: red"></span><br />

                <fieldset>
                    <legend>Technologie:</legend>
                    <label><input type="checkbox" name="technologie" value="HTML" /> HTML</label>
                    <label><input type="checkbox" name="technologie" value="CSS" /> CSS</label>
                    <label><input type="checkbox" name="technologie" value="JavaScript" /> JavaScript</label>
                    <label><input type="checkbox" name="technologie" value="React" /> React</label>
                </fieldset>
                <span id="error_technologia" style="color: red"></span><br />

                <label for="uwagi">Uwagi: </label>
                <textarea name="uwagi"></textarea><br />

                <input type="button" value="Wyślij" />
            </form>

            <hr />

            <div id="output">
                <p>Imię: <span id="imie"></span></p>
                <p>Nazwisko: <span id="nazwisko"></span></p>
                <p>Miasto: <span id="miasto"></span></p>
                <p>Stanowisko: <span id="stanowisko"></span></p>
                <p>Technologie: <span id="technologie"></span></p>
                <p>Uwagi: <span id="uwagi"></span></p>
            </div>
        </main>
    </body>
</html>
