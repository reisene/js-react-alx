<!doctype html>
<html lang="pl">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>51_2</title>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                padding-top: 80px;
            }
            .app-header {
                background-color: dimgray;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                color: #fff;
                display: flex;
                justify-content: space-between; /* Rozsuwa h2 w lewo, nav w prawo */
                align-items: center; /* Wyrównuje h2 i nav w pionie */
                padding: 0 20px;
            }
            .app-header nav button {
                background-color: transparent; /* Przezroczyste tło */
                color: #fff; /* Biały napis */
                border: 1px solid #fff; /* Cienka biała ramka */
                padding: 8px 16px; /* Odstępy wewnątrz */
                cursor: pointer; /* Kursor łapki */
                border-radius: 4px; /* Zaokrąglone rogi */
                font-size: 0.9rem;
                transition: background 0.3s; /* Płynne przejście przy najechaniu */
            }

            .app-header nav button:hover {
                background-color: rgba(
                    255,
                    255,
                    255,
                    0.2
                ); /* Delikatne podświetlenie po najechaniu */
            }
            .app-header nav a {
                text-decoration: none;
            }
            #effect {
                font-weight: 600;
                font-size: 1.2rem;
            }
        </style>
        <script src="./script.js" defer></script>
    </head>
    <body>
        <header class="app-header">
            <h2 id="app-name">JS + React</h2>
            <nav id="app-nav">
                <a href="/js-react-alx">
                    <button>Wróć na stronę główną</button>
                </a>
            </nav>
        </header>
        <div id="effect"></div>
    </body>
</html>
